<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DISH Core</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@800;900&family=Oxanium:wght@700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    body {
      background-color: #0b0c0f;
      color: #0ff;
      font-family: 'Audiowide', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    h1 {
      font-size: 1.9rem;
      margin-bottom: 2rem;
    }

    .logo-container {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background: radial-gradient(circle at center, #0b0c0f 60%, #000 100%);
      box-shadow:
        0 0 30px rgba(0, 255, 255, 0.15),
        inset 0 0 20px rgba(0, 255, 255, 0.1);
      perspective: 1000px;
    }

    .logo-container img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      filter: drop-shadow(0 0 10px #0ff)
              drop-shadow(0 0 25px rgba(0,255,255,0.5));
      animation: glowPulse 4s infinite ease-in-out;
    }

    /* Rotated elliptical orbit */
    .orbit-ellipse {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300px;
      height: 180px;
      margin-top: -90px;
      margin-left: -150px;
      border: 3px solid rgba(0, 255, 255, 0.3);
      border-radius: 50%;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
      transform: rotate(25deg);
      transform-origin: center;
      animation: orbitTilt 6s ease-in-out infinite alternate,
                 orbitSpin 8s linear infinite;
    }

    /* Small orb that follows the elliptical path */
    .orb {
      position: absolute;
      top: 0;
      left: 50%;
      width: 18px;
      height: 18px;
      margin-left: -9px;
      background: cyan;
      border-radius: 50%;
      box-shadow: 0 0 10px cyan, 0 0 25px rgba(0,255,255,0.6);
      animation: orbRotate 8s linear infinite;
      transform-origin: 0 90px;
    }

    /* Slight wobble for realism */
    @keyframes orbitTilt {
      0% { transform: rotate3d(1, 0, 0, 10deg) rotate(320deg); }
      50% { transform: rotate3d(1, 1, 0, 15deg) rotate(320deg); }
      100% { transform: rotate3d(0, 1, 0, 10deg) rotate(320deg); }
    }

    @keyframes orbRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes glowPulse {
      0%, 100% {
        filter: drop-shadow(0 0 10px #0ff)
                drop-shadow(0 0 25px rgba(0,255,255,0.5));
        opacity: 0.9;
      }
      50% {
        filter: drop-shadow(0 0 25px cyan)
                drop-shadow(0 0 45px rgba(0,255,255,0.8));
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <h1>Initializing DISH Core...</h1>

  <div class="logo-container">
    <div class="orbit-ellipse">
      <div class="orb"></div>
    </div>
    <img src="../../assets/images/DISH-Orbit.png" alt="DISH Core Logo" />
  </div>
</body>
</html>
